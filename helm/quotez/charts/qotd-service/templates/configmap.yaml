apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "qotd-service.fullname" . }}-config
  labels:
    {{- include "qotd-service.labels" . | nindent 4 }}
data:
  quotez.toml: |
    [server]
    host = "0.0.0.0"
    tcp_port = {{ .Values.service.tcpPort }}
    udp_port = {{ .Values.service.udpPort }}

    [quotes]
    directories = ["/data/quotes"]
    mode = "{{ .Values.config.mode }}"

    [polling]
    interval_seconds = {{ .Values.config.pollingInterval }}

    [health]
    enabled = {{ .Values.config.apiEnabled }}
    port = {{ .Values.service.httpPort }}

    [api]
    enabled = {{ .Values.config.apiEnabled }}
    username = "{{ .Values.config.apiUsername }}"
    password = "{{ .Values.config.apiPassword }}"
