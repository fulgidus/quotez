enabled: true

replicaCount: 1

image:
  repository: quotez
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  tcpPort: 8017
  udpPort: 8017
  httpPort: 8080

resources:
  requests:
    cpu: 50m
    memory: 32Mi
  limits:
    cpu: 200m
    memory: 64Mi

persistence:
  size: 1Gi
  storageClass: ""

config:
  mode: random
  pollingInterval: 60
  apiEnabled: true
  apiUsername: admin
  apiPassword: quotez
