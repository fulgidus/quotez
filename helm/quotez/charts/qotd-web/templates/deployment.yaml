apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "qotd-web.fullname" . }}
  labels:
    {{- include "qotd-web.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "qotd-web.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "qotd-web.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: qotd-web
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy | default "IfNotPresent" }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          env:
            {{- range $key, $val := .Values.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /
              port: {{ .Values.service.port }}
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
