apiVersion: v1
kind: Service
metadata:
  name: {{ include "qotd-web.fullname" . }}
  labels:
    {{- include "qotd-web.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "qotd-web.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
